name: kterm_example
description: kterm terminal emulator example app.
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  kterm:
    path: ../
  dartssh2: ^2.5.0
  flutter_pty: ^0.4.0
  flutter:
    sdk: flutter
  after_layout: ^1.1.0
  file_picker: ^8.0.0
  path: ^1.8.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
  fonts:
    - family: Cascadia Mono
      fonts:
        - asset: fonts/CascadiaMonoPL.ttf
