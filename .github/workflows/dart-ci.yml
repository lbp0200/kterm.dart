name: CI / CD

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: "Tests & Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze code
        run: flutter analyze lib/ --no-fatal-infos
      - name: Run tests
        run: |
          flutter test test/kitty_*.dart
          flutter test test/src/core/
          flutter test test/src/utils/
          flutter test test/src/terminal_test.dart test/src/terminal_paste_test.dart test/src/zmodem_test.dart
          flutter test test/kterm_test.dart test/sequence_test.dart test/simple_ext_test.dart

  publish:
    name: "Publish to pub.dev"
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
